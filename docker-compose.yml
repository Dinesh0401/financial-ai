services:
  api:
    build:
      context: .
      dockerfile: finzova/backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /workspace/finzova/backend
    env_file:
      - .env
    environment:
      FINZOVA_OCR_BACKEND: tesseract
      FINZOVA_TESSERACT_CMD: /usr/bin/tesseract
      PYTHONPATH: /workspace/finzova/backend
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finzova
    ports:
      - "54329:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

services:
  - type: web
    name: finna-backend
    runtime: python
    rootDir: finna/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT_PER_MINUTE
        value: "100"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_RUNTIME_URL
        sync: false
      - key: DATABASE_MIGRATION_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
